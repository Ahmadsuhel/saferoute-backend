version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: saferoute_db
    restart: always
    environment:
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB:       saferoute_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # SafeRoute Backend
  app:
    build: .
    container_name: saferoute_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      PORT:                   3000
      NODE_ENV:               production
      API_PREFIX:             /api/v1
      DATABASE_URL:           postgresql://postgres:admin123@postgres:5432/saferoute_db
      JWT_SECRET:             saferoute_jwt_secret_key_2024
      JWT_REFRESH_SECRET:     saferoute_refresh_secret_key_2024
      JWT_EXPIRES_IN:         15m
      JWT_REFRESH_EXPIRES_IN: 7d
      SALT_ROUNDS:            10
      APP_NAME:               SafeRoute API
      APP_VERSION:            1.0.0
      GOOGLE_CLIENT_ID:       ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET:   ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL:    http://localhost:3000/api/v1/auth/google/callback
      FRONTEND_URL:           http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy
    command: >
        sh -c "node src/server.js"

      

volumes:
  postgres_data: